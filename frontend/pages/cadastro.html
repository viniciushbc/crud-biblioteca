<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Biblioteca - Cadastro de Livro</title>
</head>
<body>

  <header>
    <h1>Biblioteca</h1>
  </header>

  <hr>

  <main>
    <h2>Cadastrar / Editar Livro</h2>

    <form>
      <p>
        <label for="titulo">Título</label><br>
        <input type="text" id="titulo" name="titulo">
      </p>
      <p>
        <label for="autor">Autor</label><br>
        <input type="text" id="autor" name="autor">
      </p>
      <p>
        <label for="ano">Ano</label><br>
        <input type="number" id="ano" name="ano">
      </p>
      <p>
        <label for="editora">Editora</label><br>
        <input type="text" id="editora" name="editora">
      </p>
      <p>
        <label for="genero">Gênero</label><br>
        <input type="text" id="genero" name="genero">
      </p>
      <p>
        <label for="paginas">Páginas</label><br>
        <input type="number" id="paginas" name="paginas">
      </p>
      <p>
        <label for="quantidade">Quantidade em estoque</label><br>
        <input type="number" id="quantidade" name="quantidade">
      </p>
      <p>
        <label for="sinopse">Sinopse</label><br>
        <textarea id="sinopse" name="sinopse" rows="5" cols="50"></textarea>
      </p>
      <p>
        <button type="submit">Salvar</button>
        <a href="lista-livros.html">Cancelar</a>
      </p>
    </form>
  </main>

  <hr>
</body>
</html>
